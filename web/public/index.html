<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WC26 Probability Desk</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>⚽</text></svg>" />
</head>
<body>
  <header>
    <div class="wrap">
      <div class="mast">
        <div>
          <div class="eyebrow">WC26 / Probability Desk</div>
          <h1>Model <span>vs</span> Market</h1>
          <p class="sub">Pre-match forecasts, live market gaps, and a paper ledger.</p>
        </div>
        <div class="mast-status">
          <span class="live-dot"></span>
          <span>snapshot feed</span>
        </div>
      </div>
      <nav id="tabs">
        <button data-tab="play" class="play-tab"><b>01</b> Pick'em</button>
        <button data-tab="tournament" class="active"><b>02</b> Forecast</button>
        <button data-tab="results"><b>03</b> Results</button>
        <button data-tab="edges"><b>04</b> Market board</button>
        <button data-tab="paper"><b>05</b> Paper ledger</button>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <div id="status" class="status">Loading…</div>
    <section id="play" class="tab hidden"></section>
    <section id="tournament" class="tab"></section>
    <section id="results" class="tab hidden"></section>
    <section id="edges" class="tab hidden"></section>
    <section id="paper" class="tab hidden"></section>
  </main>

  <footer class="wrap">
    <span id="meta"></span>
    <span class="disclaimer">Research model. Paper positions only. Market gaps are pre-execution.</span>
  </footer>

  <script src="firebase-config.js"></script>
  <script src="auth.js"></script>
  <script src="fantasy.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
